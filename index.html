
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: var(--font-sans); }
  .app { padding: 1.5rem 0; max-width: 680px; }
  .header { margin-bottom: 1.5rem; }
  .header h1 { font-size: 22px; font-weight: 500; color: var(--color-text-primary); }
  .header p { font-size: 14px; color: var(--color-text-secondary); margin-top: 4px; }
  .search-box { display: flex; gap: 8px; margin-bottom: 1rem; }
  .search-box input { flex: 1; padding: 10px 14px; border: 0.5px solid var(--color-border-secondary); border-radius: var(--border-radius-md); font-size: 15px; font-family: var(--font-sans); background: var(--color-background-primary); color: var(--color-text-primary); outline: none; }
  .search-box input:focus { border-color: var(--color-border-primary); box-shadow: 0 0 0 3px rgba(0,0,0,0.06); }
  .search-box button { padding: 10px 20px; border: 0.5px solid var(--color-border-secondary); border-radius: var(--border-radius-md); background: var(--color-background-primary); color: var(--color-text-primary); font-size: 14px; font-family: var(--font-sans); cursor: pointer; display: flex; align-items: center; gap: 6px; white-space: nowrap; }
  .search-box button:hover { background: var(--color-background-secondary); }
  .search-box button:active { transform: scale(0.98); }
  .search-box button:disabled { opacity: 0.5; cursor: not-allowed; }
  .chips { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 1.5rem; }
  .chip { padding: 5px 12px; border: 0.5px solid var(--color-border-tertiary); border-radius: 999px; font-size: 13px; color: var(--color-text-secondary); cursor: pointer; background: var(--color-background-primary); }
  .chip:hover { background: var(--color-background-secondary); color: var(--color-text-primary); border-color: var(--color-border-secondary); }
  .result { background: var(--color-background-primary); border: 0.5px solid var(--color-border-tertiary); border-radius: var(--border-radius-lg); padding: 1.25rem; }
  .result-header { display: flex; align-items: center; gap: 10px; margin-bottom: 1rem; padding-bottom: 1rem; border-bottom: 0.5px solid var(--color-border-tertiary); }
  .result-header i { font-size: 20px; color: var(--color-text-secondary); }
  .result-header .topic { font-size: 15px; font-weight: 500; color: var(--color-text-primary); }
  .result-header .badge { margin-left: auto; font-size: 12px; padding: 3px 10px; border-radius: var(--border-radius-md); background: var(--color-background-success); color: var(--color-text-success); }
  .section { margin-bottom: 1.25rem; }
  .section-label { font-size: 12px; font-weight: 500; color: var(--color-text-tertiary); text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 8px; }
  .section-body { font-size: 14px; color: var(--color-text-primary); line-height: 1.7; }
  .key-points { list-style: none; display: flex; flex-direction: column; gap: 6px; }
  .key-points li { display: flex; gap: 8px; font-size: 14px; color: var(--color-text-primary); line-height: 1.6; }
  .key-points li::before { content: ''; width: 6px; height: 6px; border-radius: 50%; background: var(--color-text-tertiary); margin-top: 8px; flex-shrink: 0; }
  .sources { display: flex; flex-direction: column; gap: 6px; }
  .source-item { display: flex; align-items: center; gap: 8px; font-size: 13px; color: var(--color-text-secondary); }
  .source-item i { font-size: 15px; }
  .loading { display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 3rem 1rem; gap: 12px; }
  .loading-text { font-size: 14px; color: var(--color-text-secondary); }
  .spinner { width: 28px; height: 28px; border: 2px solid var(--color-border-tertiary); border-top-color: var(--color-text-secondary); border-radius: 50%; animation: spin 0.8s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .empty { display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 3rem 1rem; gap: 8px; color: var(--color-text-tertiary); }
  .empty i { font-size: 32px; }
  .empty p { font-size: 14px; }
  .error-box { background: var(--color-background-danger); border: 0.5px solid var(--color-border-danger); border-radius: var(--border-radius-md); padding: 1rem 1.25rem; font-size: 14px; color: var(--color-text-danger); }
  .two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
  @media (max-width: 480px) { .two-col { grid-template-columns: 1fr; } }
</style>

<div class="app">
  <h2 class="sr-only">AI Research Assistant — search any topic and get a structured report</h2>
  <div class="header">
    <h1><i class="ti ti-search" aria-hidden="true" style="font-size:20px; margin-right:8px; vertical-align:-2px;"></i>AI Research Assistant</h1>
    <p>Ask anything — get a structured, sourced research report instantly</p>
  </div>

  <div class="search-box">
    <input type="text" id="query" placeholder="e.g. How does quantum computing work?" />
    <button id="searchBtn" onclick="doResearch()">
      <i class="ti ti-sparkles" aria-hidden="true"></i> Research ↗
    </button>
  </div>

  <div class="chips">
    <span class="chip" onclick="fillAndSearch('Latest breakthroughs in AI 2025')">AI breakthroughs 2025</span>
    <span class="chip" onclick="fillAndSearch('How does the human immune system work')">Human immune system</span>
    <span class="chip" onclick="fillAndSearch('Pros and cons of intermittent fasting')">Intermittent fasting</span>
    <span class="chip" onclick="fillAndSearch('What is blockchain technology')">Blockchain explained</span>
  </div>

  <div id="output">
    <div class="empty">
      <i class="ti ti-telescope" aria-hidden="true"></i>
      <p>Enter a topic above to generate your research report</p>
    </div>
  </div>
</div>

<script>
  const input = document.getElementById('query');
  input.addEventListener('keydown', e => { if (e.key === 'Enter') doResearch(); });

  function fillAndSearch(text) {
    input.value = text;
    doResearch();
  }

  async function doResearch() {
    const query = input.value.trim();
    if (!query) return;

    const btn = document.getElementById('searchBtn');
    const output = document.getElementById('output');
    btn.disabled = true;
    btn.innerHTML = '<i class="ti ti-loader" aria-hidden="true" style="animation:spin 0.8s linear infinite;display:inline-block;"></i> Researching...';

    output.innerHTML = `<div class="loading"><div class="spinner"></div><p class="loading-text">Searching the web and synthesizing sources...</p></div>`;

    try {
      const response = await fetch('https://api.anthropic.com/v1/messages', {
        method: 'POST',
headers: { 'Content-Type': 'application/json', 'x-api-key': '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', 'anthropic-version': '2023-06-01' },
       body: JSON.stringify({
          model: 'claude-sonnet-4-20250514',
          max_tokens: 1000,
          tools: [{ type: 'web_search_20250305', name: 'web_search' }],
          system: `You are a research assistant. When given a topic, search the web and return ONLY a JSON object with NO markdown backticks, NO preamble. Structure:
{
  "summary": "2-3 sentence overview",
  "key_points": ["point 1", "point 2", "point 3", "point 4"],
  "pros": ["pro 1", "pro 2", "pro 3"],
  "cons": ["con 1", "con 2", "con 3"],
  "sources": ["Source Name 1", "Source Name 2", "Source Name 3"],
  "verdict": "1 sentence takeaway"
}
If pros/cons don't apply, use "insights" key with 3 items instead. Always return valid JSON only.`,
          messages: [{ role: 'user', content: `Research this topic: ${query}` }]
        })
      });

      const data = await response.json();
      const textBlock = data.content.filter(b => b.type === 'text').map(b => b.text).join('');
      const clean = textBlock.replace(/```json|```/g, '').trim();
      const parsed = JSON.parse(clean);
      renderResult(query, parsed);
    } catch (err) {
      output.innerHTML = `<div class="error-box"><i class="ti ti-alert-circle" aria-hidden="true" style="margin-right:6px;"></i>Something went wrong. Please try again.</div>`;
    }

    btn.disabled = false;
    btn.innerHTML = '<i class="ti ti-sparkles" aria-hidden="true"></i> Research ↗';
  }

  function renderResult(query, d) {
    const hasPros = d.pros && d.cons;
    const secondSection = hasPros
      ? `<div class="two-col">
          <div class="section">
            <div class="section-label"><i class="ti ti-thumb-up" aria-hidden="true"></i> Pros</div>
            <ul class="key-points">${d.pros.map(p => `<li>${p}</li>`).join('')}</ul>
          </div>
          <div class="section">
            <div class="section-label"><i class="ti ti-thumb-down" aria-hidden="true"></i> Cons</div>
            <ul class="key-points">${d.cons.map(c => `<li>${c}</li>`).join('')}</ul>
          </div>
        </div>`
      : `<div class="section">
          <div class="section-label"><i class="ti ti-bulb" aria-hidden="true"></i> Key insights</div>
          <ul class="key-points">${(d.insights||[]).map(i => `<li>${i}</li>`).join('')}</ul>
        </div>`;

    document.getElementById('output').innerHTML = `
      <div class="result">
        <div class="result-header">
          <i class="ti ti-file-text" aria-hidden="true"></i>
          <span class="topic">${query}</span>
          <span class="badge"><i class="ti ti-check" aria-hidden="true"></i> Done</span>
        </div>
        <div class="section">
          <div class="section-label"><i class="ti ti-align-left" aria-hidden="true"></i> Summary</div>
          <div class="section-body">${d.summary}</div>
        </div>
        <div class="section">
          <div class="section-label"><i class="ti ti-list" aria-hidden="true"></i> Key points</div>
          <ul class="key-points">${d.key_points.map(p => `<li>${p}</li>`).join('')}</ul>
        </div>
        ${secondSection}
        <div class="section">
          <div class="section-label"><i class="ti ti-star" aria-hidden="true"></i> Verdict</div>
          <div class="section-body" style="font-style:italic;">${d.verdict}</div>
        </div>
        <div class="section" style="margin-bottom:0;">
          <div class="section-label"><i class="ti ti-link" aria-hidden="true"></i> Sources</div>
          <div class="sources">${(d.sources||[]).map(s => `<div class="source-item"><i class="ti ti-world" aria-hidden="true"></i>${s}</div>`).join('')}</div>
        </div>
      </div>`;
  }
</script>
