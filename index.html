<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI Research Assistant</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0e0e11;
      --surface: #16161a;
      --surface2: #1e1e24;
      --border: #2a2a35;
      --border2: #3a3a48;
      --text: #f0f0f5;
      --text2: #9090a8;
      --text3: #5a5a72;
      --accent: #7c6af7;
      --accent2: #a89cf7;
      --green: #4ade80;
      --red: #f87171;
      --amber: #fbbf24;
    }

    body {
      font-family: 'Sora', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 2rem 1rem;
    }

    .container { max-width: 720px; margin: 0 auto; }

    .header { margin-bottom: 2.5rem; text-align: center; }
    .header .tag {
      display: inline-block;
      font-size: 11px;
      font-family: 'JetBrains Mono', monospace;
      color: var(--accent2);
      background: rgba(124,106,247,0.12);
      border: 1px solid rgba(124,106,247,0.25);
      border-radius: 999px;
      padding: 4px 14px;
      margin-bottom: 1rem;
      letter-spacing: 0.08em;
    }
    .header h1 { font-size: 32px; font-weight: 600; letter-spacing: -0.02em; margin-bottom: 8px; }
    .header h1 span { color: var(--accent2); }
    .header p { font-size: 14px; color: var(--text2); }

    .api-bar {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 1rem 1.25rem;
      margin-bottom: 1.25rem;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .api-bar label { font-size: 12px; color: var(--text2); white-space: nowrap; font-family: 'JetBrains Mono', monospace; }
    .api-bar input {
      flex: 1;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 8px 12px;
      font-size: 13px;
      font-family: 'JetBrains Mono', monospace;
      color: var(--text);
      outline: none;
    }
    .api-bar input:focus { border-color: var(--accent); }
    .api-bar a { font-size: 12px; color: var(--accent2); text-decoration: none; white-space: nowrap; }
    .api-bar a:hover { text-decoration: underline; }

    .search-row { display: flex; gap: 8px; margin-bottom: 1rem; }
    .search-row input {
      flex: 1;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 14px 18px;
      font-size: 15px;
      font-family: 'Sora', sans-serif;
      color: var(--text);
      outline: none;
      transition: border-color 0.2s;
    }
    .search-row input::placeholder { color: var(--text3); }
    .search-row input:focus { border-color: var(--accent); }
    .search-row button {
      padding: 14px 22px;
      background: var(--accent);
      border: none;
      border-radius: 12px;
      color: #fff;
      font-size: 14px;
      font-family: 'Sora', sans-serif;
      font-weight: 500;
      cursor: pointer;
      white-space: nowrap;
      transition: opacity 0.2s, transform 0.1s;
    }
    .search-row button:hover { opacity: 0.88; }
    .search-row button:active { transform: scale(0.97); }
    .search-row button:disabled { opacity: 0.4; cursor: not-allowed; }

    .chips { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 2rem; }
    .chip {
      padding: 6px 14px;
      border: 1px solid var(--border);
      border-radius: 999px;
      font-size: 12px;
      color: var(--text2);
      cursor: pointer;
      background: transparent;
      font-family: 'Sora', sans-serif;
      transition: all 0.15s;
    }
    .chip:hover { border-color: var(--accent); color: var(--accent2); background: rgba(124,106,247,0.08); }

    .loading {
      display: flex; flex-direction: column; align-items: center;
      gap: 14px; padding: 4rem 1rem; color: var(--text2); font-size: 14px;
    }
    .pulse-ring {
      width: 40px; height: 40px; border-radius: 50%;
      border: 2px solid var(--border2);
      border-top-color: var(--accent);
      animation: spin 0.9s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .empty { display: flex; flex-direction: column; align-items: center; gap: 10px; padding: 4rem 1rem; color: var(--text3); }
    .empty svg { opacity: 0.4; }
    .empty p { font-size: 14px; }

    .result { animation: fadeUp 0.3s ease; }
    @keyframes fadeUp { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }

    .result-title {
      font-size: 18px; font-weight: 600; margin-bottom: 1.5rem;
      padding-bottom: 1rem; border-bottom: 1px solid var(--border);
      display: flex; align-items: center; gap: 10px;
    }
    .result-title .done-badge {
      margin-left: auto; font-size: 11px; padding: 3px 10px;
      background: rgba(74,222,128,0.12); color: var(--green);
      border: 1px solid rgba(74,222,128,0.25); border-radius: 999px;
      font-family: 'JetBrains Mono', monospace;
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 1.25rem;
      margin-bottom: 1rem;
    }
    .card-label {
      font-size: 11px; font-family: 'JetBrains Mono', monospace;
      color: var(--text3); text-transform: uppercase; letter-spacing: 0.08em;
      margin-bottom: 10px; display: flex; align-items: center; gap: 6px;
    }
    .card-label .dot { width: 6px; height: 6px; border-radius: 50%; background: var(--accent); }
    .card-body { font-size: 14px; color: var(--text2); line-height: 1.75; }

    .points { list-style: none; display: flex; flex-direction: column; gap: 8px; }
    .points li { display: flex; gap: 10px; font-size: 14px; color: var(--text2); line-height: 1.65; }
    .points li::before { content: ''; width: 5px; height: 5px; border-radius: 50%; background: var(--accent2); margin-top: 9px; flex-shrink: 0; }

    .two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; margin-bottom: 1rem; }
    @media (max-width: 520px) { .two-col { grid-template-columns: 1fr; } }

    .pro-item { display: flex; gap: 8px; font-size: 13px; color: var(--text2); line-height: 1.6; margin-bottom: 7px; }
    .pro-item::before { content: '+'; color: var(--green); font-weight: 600; flex-shrink: 0; margin-top: 1px; }
    .con-item { display: flex; gap: 8px; font-size: 13px; color: var(--text2); line-height: 1.6; margin-bottom: 7px; }
    .con-item::before { content: '−'; color: var(--red); font-weight: 600; flex-shrink: 0; margin-top: 1px; }

    .verdict-card {
      background: rgba(124,106,247,0.07);
      border: 1px solid rgba(124,106,247,0.2);
      border-radius: 14px; padding: 1.25rem; margin-bottom: 1rem;
    }
    .verdict-card .card-label .dot { background: var(--accent2); }
    .verdict-card .card-body { color: var(--text); font-style: italic; }

    .sources { display: flex; flex-direction: column; gap: 6px; }
    .source-item {
      display: flex; align-items: center; gap: 8px;
      font-size: 13px; color: var(--text3);
      font-family: 'JetBrains Mono', monospace;
    }
    .source-dot { width: 4px; height: 4px; border-radius: 50%; background: var(--border2); flex-shrink: 0; }

    .error-box {
      background: rgba(248,113,113,0.08); border: 1px solid rgba(248,113,113,0.25);
      border-radius: 12px; padding: 1rem 1.25rem;
      font-size: 14px; color: var(--red);
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <div class="tag">// powered by gemini + google search</div>
      <h1>AI <span>Research</span> Assistant</h1>
      <p>Ask anything — get a structured, sourced report in seconds</p>
    </div>

    <div class="api-bar">
      <label>API_KEY</label>
      <input type="password" id="apiKey" placeholder="Paste your Gemini API key here..." />
      <a href="https://aistudio.google.com/apikey" target="_blank">Get free key →</a>
    </div>

    <div class="search-row">
      <input type="text" id="query" placeholder="e.g. How does quantum computing work?" />
      <button id="searchBtn" onclick="doResearch()">Research ↗</button>
    </div>

    <div class="chips">
      <span class="chip" onclick="fillAndSearch('Latest breakthroughs in AI 2025')">AI breakthroughs 2025</span>
      <span class="chip" onclick="fillAndSearch('How does the human immune system work')">Human immune system</span>
      <span class="chip" onclick="fillAndSearch('Pros and cons of intermittent fasting')">Intermittent fasting</span>
      <span class="chip" onclick="fillAndSearch('What is blockchain technology')">Blockchain explained</span>
      <span class="chip" onclick="fillAndSearch('Best programming languages to learn in 2025')">Best languages 2025</span>
    </div>

    <div id="output">
      <div class="empty">
        <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
          <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
        </svg>
        <p>Enter a topic above to generate your research report</p>
      </div>
    </div>
  </div>

  <script>
    const qInput = document.getElementById('query');
    qInput.addEventListener('keydown', e => { if (e.key === 'Enter') doResearch(); });

    function fillAndSearch(text) {
      qInput.value = text;
      doResearch();
    }

    async function doResearch() {
      const query = qInput.value.trim();
      const apiKey = document.getElementById('apiKey').value.trim();
      if (!query) return;
      if (!apiKey) {
        document.getElementById('output').innerHTML = `<div class="error-box">Please paste your Gemini API key above first. Get one free at <a href="https://aistudio.google.com/apikey" target="_blank" style="color:inherit;text-decoration:underline;">aistudio.google.com</a></div>`;
        return;
      }

      const btn = document.getElementById('searchBtn');
      btn.disabled = true;
      btn.textContent = 'Researching...';
      document.getElementById('output').innerHTML = `<div class="loading"><div class="pulse-ring"></div><p>Searching the web and synthesizing sources...</p></div>`;

      const prompt = `You are a research assistant. Research the following topic using your knowledge and web search. Return ONLY a valid JSON object with NO markdown backticks, NO extra text. Use this exact structure:
{
  "summary": "2-3 sentence overview of the topic",
  "key_points": ["point 1", "point 2", "point 3", "point 4"],
  "pros": ["pro 1", "pro 2", "pro 3"],
  "cons": ["con 1", "con 2", "con 3"],
  "sources": ["Source or website name 1", "Source or website name 2", "Source or website name 3"],
  "verdict": "One sentence takeaway or conclusion"
}
If pros/cons don't make sense for the topic, replace them with "insights": ["insight 1", "insight 2", "insight 3"].
Topic: ${query}`;

      try {
        const res = await fetch(
          `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${apiKey}`,
          {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
              contents: [{ parts: [{ text: prompt }] }],
              tools: [{ google_search: {} }]
            })
          }
        );

        const data = await res.json();
        if (data.error) throw new Error(data.error.message);

        const raw = data.candidates?.[0]?.content?.parts?.[0]?.text || '';
        const clean = raw.replace(/```json|```/g, '').trim();
        const parsed = JSON.parse(clean);
        renderResult(query, parsed);
      } catch (err) {
        document.getElementById('output').innerHTML = `<div class="error-box">Error: ${err.message || 'Something went wrong. Check your API key and try again.'}</div>`;
      }

      btn.disabled = false;
      btn.textContent = 'Research ↗';
    }

    function renderResult(query, d) {
      const hasPros = d.pros && d.cons;

      const secondSection = hasPros
        ? `<div class="two-col">
            <div class="card">
              <div class="card-label"><div class="dot" style="background:#4ade80"></div>Pros</div>
              ${d.pros.map(p => `<div class="pro-item">${p}</div>`).join('')}
            </div>
            <div class="card">
              <div class="card-label"><div class="dot" style="background:#f87171"></div>Cons</div>
              ${d.cons.map(c => `<div class="con-item">${c}</div>`).join('')}
            </div>
          </div>`
        : `<div class="card" style="margin-bottom:1rem;">
            <div class="card-label"><div class="dot"></div>Key insights</div>
            <ul class="points">${(d.insights||[]).map(i => `<li>${i}</li>`).join('')}</ul>
          </div>`;

      document.getElementById('output').innerHTML = `
        <div class="result">
          <div class="result-title">
            ${query}
            <span class="done-badge">✓ done</span>
          </div>
          <div class="card">
            <div class="card-label"><div class="dot"></div>Summary</div>
            <div class="card-body">${d.summary}</div>
          </div>
          <div class="card">
            <div class="card-label"><div class="dot"></div>Key points</div>
            <ul class="points">${d.key_points.map(p => `<li>${p}</li>`).join('')}</ul>
          </div>
          ${secondSection}
          <div class="verdict-card">
            <div class="card-label"><div class="dot"></div>Verdict</div>
            <div class="card-body">${d.verdict}</div>
          </div>
          <div class="card">
            <div class="card-label"><div class="dot"></div>Sources</div>
            <div class="sources">${(d.sources||[]).map(s => `<div class="source-item"><div class="source-dot"></div>${s}</div>`).join('')}</div>
          </div>
        </div>`;
    }
  </script>
</body>
</html>
